<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAeygMBPsJdXO76susC4Tk5rwTfZLUq5VE",
    authDomain: "wedding-qr-27f3c.firebaseapp.com",
    projectId: "wedding-qr-27f3c",
    storageBucket: "wedding-qr-27f3c.firebasestorage.app",
    messagingSenderId: "149053298560",
    appId: "1:149053298560:web:b93d2395bcb0e51d7a9365"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const guestsCol = collection(db, 'guests');

  window._db = db;
  window._guestsCol = guestsCol;
  window._firestore = { collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot, runTransaction };
  window._dbReady = true;
  window.dispatchEvent(new Event('dbReady'));
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap');

  .toast.show { opacity: 1; }
  .guest-item .dl-btn { background: none; border: 1px solid rgba(212,175,127,0.3); color: var(--gold); font-size: 13px; cursor: pointer; padding: 4px 10px; border-radius: 8px; transition: all 0.2s ease; white-space: nowrap; }
  .guest-item .dl-btn:hover { background: rgba(212,175,127,0.1); border-color: var(--gold); }

  .admin-add-form input { flex: 1; }
  .admin-add-form button { width: auto; padding: 14px 20px; white-space: nowrap; }

<script>
const ADMIN_PASS = '19921995';
const SITE_URL = 'https://wedding-qr1.netlify.app';

let guests = [];
let unsubscribe = null;
let qrScanner = null;
let lastScanned = null;
let scanCooldown = false;

function onDbReady(cb) {
  if (window._dbReady) cb();
  else window.addEventListener('dbReady', cb);
}

// Start listening to guests collection immediately on page load
onDbReady(() => {
  const { onSnapshot } = window._firestore;
  onSnapshot(window._guestsCol, (snapshot) => {
    guests = snapshot.docs.map(d => ({ docId: d.id, ...d.data() }));
    if (document.getElementById('admin-content').style.display === 'block') renderAdmin();
  });
});

function showPage(page, btn) {
  if (page === 'scanner') resetScan();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (btn) btn.classList.add('active');
  if (page === 'admin') renderAdmin();
}







function scanFromImage(input) {
  if (!input.files || !input.files[0]) return;
  const status = document.getElementById('camera-status');
  status.textContent = '🔍 Reading...';
  QrScanner.scanImage(input.files[0], { returnDetailedScanResult: true })
    .then(result => { handleScannedCode(result.data); input.value = ''; })
    .catch(() => { status.textContent = '⚠️ Could not read QR, try a clearer photo'; input.value = ''; });
}

async function startCamera() {
  const status = document.getElementById('camera-status');
  const video = document.getElementById('camera-video');
  status.textContent = 'Starting camera...';
  try {
    qrScanner = new QrScanner(video, result => {
      if (!scanCooldown) handleScannedCode(result.data);
    }, { returnDetailedScanResult: true, preferredCamera: 'environment' });
    await qrScanner.start();
    document.getElementById('camera-wrapper').style.display = 'block';
    document.getElementById('start-camera-btn').style.display = 'none';
    status.textContent = 'Point camera at QR code';
  } catch(e) {
    status.textContent = '⚠️ Could not access camera';
  }
}

async function checkManualCode() {
  const code = document.getElementById('manual-code').value.trim().toUpperCase();
  if (!code.startsWith('WD-')) { showToast('⚠️ Code must start with WD-'); return; }
  await handleScannedCode(code);
  document.getElementById('manual-code').value = '';
}

async function handleScannedCode(raw) {
  let val = raw.trim();
  if (val.includes('verify=')) val = val.split('verify=')[1].split('&')[0];
  const match = val.match(/WD-[A-Z0-9]+/);
  if (match) val = match[0];
  val = val.toUpperCase();
  if (!val.startsWith('WD-')) return;
  if (val === lastScanned) return;
  lastScanned = val;
  scanCooldown = true;

  document.getElementById('camera-status').textContent = '🔍 Verifying...';

  try {
    const { doc, runTransaction } = window._firestore;
    const guestData = guests.find(g => g.id === val);

    if (guestData) {
      // Use transaction to prevent double-entry if 2 scanners scan same QR simultaneously
      const guestRef = doc(window._db, 'guests', guestData.docId);
      const result = await runTransaction(window._db, async (transaction) => {
        const snap = await transaction.get(guestRef);
        if (!snap.exists()) return 'not_found';
        if (snap.data().scanned) return 'already';
        transaction.update(guestRef, { scanned: true, scannedAt: new Date().toISOString() });
        return 'allowed';
      });

      if (result === 'allowed') {
        document.getElementById('result-name-ok').textContent = guestData.name;
        document.getElementById('result-allowed').style.display = 'block';
        document.getElementById('result-duplicate').style.display = 'none';
        document.getElementById('result-denied').style.display = 'none';
        document.getElementById('camera-status').textContent = '✅ Access Allowed';
        playBeep(true);
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        document.getElementById('result-allowed').classList.add('pulse');
        setTimeout(() => document.getElementById('result-allowed').classList.remove('pulse'), 400);
      } else {
        // 'already' or 'not_found'
        document.getElementById('result-name-dup').textContent = guestData.name;
        document.getElementById('result-allowed').style.display = 'none';
        document.getElementById('result-duplicate').style.display = 'block';
        document.getElementById('result-denied').style.display = 'none';
        document.getElementById('camera-status').textContent = '⚠️ Already checked in!';
        playBeep(false);
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      }
    } else {
      document.getElementById('result-allowed').style.display = 'none';
      document.getElementById('result-duplicate').style.display = 'none';
      document.getElementById('result-denied').style.display = 'block';
      document.getElementById('camera-status').textContent = '❌ QR Code not registered';
      playBeep(false);
      if (navigator.vibrate) navigator.vibrate(500);
    }
  } catch(e) {
    document.getElementById('camera-status').textContent = '⚠️ Connection error';
  }

  setTimeout(() => {
    scanCooldown = false; lastScanned = null;
    document.getElementById('camera-status').textContent = 'Point camera at QR code';
    document.getElementById('result-allowed').style.display = 'none';
    document.getElementById('result-duplicate').style.display = 'none';
    document.getElementById('result-denied').style.display = 'none';
  }, 3000);
}

function playBeep(success) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = success ? 880 : 300;
    o.type = success ? 'sine' : 'square';
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

function resetScan() {
  if (qrScanner) { qrScanner.stop(); qrScanner.destroy(); qrScanner = null; }
  lastScanned = null; scanCooldown = false;
  document.getElementById('camera-wrapper').style.display = 'none';
  document.getElementById('start-camera-btn').style.display = 'block';
  document.getElementById('camera-status').textContent = 'Open camera and scan the QR code';
  document.getElementById('result-allowed').style.display = 'none';
  document.getElementById('result-duplicate').style.display = 'none';
  document.getElementById('result-denied').style.display = 'none';
  document.getElementById('qr-file-input').value = '';
}

function checkPass() {
  const pass = document.getElementById('admin-pass').value;
  if (pass === ADMIN_PASS) {
    document.getElementById('admin-lock').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
    renderAdmin();
  } else { showToast('❌ Incorrect password'); }
}

function lockAdmin() {
  document.getElementById('admin-lock').style.display = 'block';
  document.getElementById('admin-content').style.display = 'none';
  document.getElementById('admin-pass').value = '';
}

function renderAdmin() {
  const total = guests.length;
  const scanned = guests.filter(g => g.scanned).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-scanned').textContent = scanned;
  document.getElementById('stat-pending').textContent = total - scanned;

  const list = document.getElementById('guest-list');
  if (total === 0) { list.innerHTML = '<div class="empty-state">No guests registered yet</div>'; return; }

  list.innerHTML = guests.map((g) => `
    <div class="guest-item">
      <div style="flex:1;min-width:0">
        <div class="name">${g.name}</div>
        <div class="gid">${g.id}</div>
      </div>
      <span class="badge ${g.scanned ? 'scanned' : 'pending'}">${g.scanned ? '✓ Attended' : 'Not Yet'}</span>
      <button class="dl-btn" onclick="downloadGuestQR('${g.id}', '${g.name.replace(/'/g, "\\'")}')">💾 Save</button>
      <button class="del-btn" onclick="deleteGuest('${g.docId}', '${g.name}')">🗑</button>
    </div>
  `).join('');
}

async function deleteGuest(docId, name) {
  if (!confirm('Delete ' + name + '?')) return;
  onDbReady(async () => {
    const { doc, deleteDoc } = window._firestore;
    await deleteDoc(doc(window._db, 'guests', docId));
    showToast('✅ Guest deleted');
  });
}

async function clearAll() {
  if (!confirm('Are you sure? All data will be permanently deleted.')) return;
  onDbReady(async () => {
    const { doc, deleteDoc, getDocs } = window._firestore;
    const snapshot = await getDocs(window._guestsCol);
    await Promise.all(snapshot.docs.map(d => deleteDoc(doc(window._db, 'guests', d.id))));
    showToast('✅ All data cleared');
  });
}

function exportCSV() {
  const rows = [['Name', 'Code', 'Attendance', 'Registered At']];
  guests.forEach(g => rows.push([g.name, g.id, g.scanned ? 'Attended' : 'Not Yet', g.registeredAt]));
  const csv = rows.map(r => r.join(',')).join('\n');
  const link = document.createElement('a');
  link.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  link.download = 'guests-list.csv';
  link.click();
}

async function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = async (e) => {
    const text = e.target.result;
    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    
    // Try to detect if it's CSV with comma or just names
    let names = [];
    lines.forEach(line => {
      if (line.includes(',')) {
        // CSV format - take first column (usually Name)
        const parts = line.split(',');
        const name = parts[0].trim();
        if (name && name.toLowerCase() !== 'name') names.push(name);
      } else {
        // Plain names, one per line
        names.push(line);
      }
    });
    
    if (names.length === 0) {
      showToast('⚠️ No valid names found in file');
      document.getElementById('csv-import').value = '';
      return;
    }
    
    showToast('⏳ Importing ' + names.length + ' guests...');
    let added = 0, duplicates = 0;
    
    for (const name of names) {
      const exists = guests.find(g => g.name === name);
      if (exists) {
        duplicates++;
        continue;
      }
      
      onDbReady(async () => {
        const { addDoc } = window._firestore;
        const id = 'WD-' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2, 5);
        await addDoc(window._guestsCol, { id, name, scanned: false, registeredAt: new Date().toISOString() });
        added++;
      });
    }
    
    // Small delay for all to process
    await new Promise(r => setTimeout(r, 500 * names.length / 10));
    showToast('✅ Imported ' + added + ' guests' + (duplicates > 0 ? ' (' + duplicates + ' duplicates skipped)' : ''));
    document.getElementById('csv-import').value = '';
  };
  reader.readAsText(file);
}

async function adminAddGuest() {
  const input = document.getElementById('admin-guest-name');
  const name = input.value.trim();
  if (!name || name.length < 2) { showToast('⚠️ Enter a valid name'); return; }
  const exists = guests.find(g => g.name === name);
  if (exists) { showToast('⚠️ Name already registered'); return; }
  onDbReady(async () => {
    const { addDoc } = window._firestore;
    const id = 'WD-' + Date.now().toString(36).toUpperCase();
    await addDoc(window._guestsCol, { id, name, scanned: false, registeredAt: new Date().toISOString() });
    showToast('✅ ' + name + ' added!');
    input.value = '';
    input.focus();
  });
}

function downloadGuestQR(id, name) {
  // Create a hidden QR code, render it, then build the invitation card
  const tempDiv = document.createElement('div');
  tempDiv.style.cssText = 'position:fixed;left:-9999px;top:-9999px;background:white;padding:12px;';
  document.body.appendChild(tempDiv);

  new QRCode(tempDiv, {
    text: SITE_URL + '/?verify=' + id,
    width: 400, height: 400,
    colorDark: '#0A0A0A', colorLight: '#FAFAF8',
    correctLevel: QRCode.CorrectLevel.H
  });

  setTimeout(() => {
    const qrCanvas = tempDiv.querySelector('canvas');
    if (!qrCanvas) { showToast('⚠️ Error generating QR'); document.body.removeChild(tempDiv); return; }

    const card = document.createElement('canvas');
    card.width = 1000; card.height = 1400;
    const ctx = card.getContext('2d');

    // Background
    ctx.fillStyle = '#FAFAF8';
    ctx.fillRect(0, 0, 1000, 1400);

    // Gold border bars
    ctx.fillStyle = '#C9A84C';
    ctx.fillRect(0, 0, 1000, 22);
    ctx.fillRect(0, 1378, 1000, 22);

    // Side gold lines
    ctx.fillStyle = '#C9A84C';
    ctx.fillRect(0, 0, 6, 1400);
    ctx.fillRect(994, 0, 6, 1400);

    // Title
    ctx.fillStyle = '#C9A84C';
    ctx.font = 'bold 62px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('دعوة زفاف', 500, 110);

    // Date
    ctx.fillStyle = '#999';
    ctx.font = '34px Arial';
    ctx.fillText('الخميس 3 سبتمبر 2026', 500, 168);

    // Divider line
    ctx.strokeStyle = '#C9A84C';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(300, 200); ctx.lineTo(700, 200); ctx.stroke();

    // QR Code
    ctx.drawImage(qrCanvas, 200, 225, 600, 600);

    // Guest name
    ctx.fillStyle = '#0A0A0A';
    ctx.font = 'bold 54px Arial';
    ctx.fillText(name, 500, 910);

    // Guest ID
    ctx.fillStyle = '#BBB';
    ctx.font = '28px Arial';
    ctx.fillText(id, 500, 965);

    // Divider
    ctx.strokeStyle = '#DDD';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(200, 1000); ctx.lineTo(800, 1000); ctx.stroke();

    // Venue name
    ctx.fillStyle = '#C9A84C';
    ctx.font = 'bold 38px Arial';
    ctx.fillText('Golden Halls', 500, 1065);

    // Single person notice
    ctx.fillStyle = '#888';
    ctx.font = '26px Arial';
    ctx.fillText('هذا الباركود لشخص واحد فقط', 500, 1120);

    // Keep this card
    ctx.fillStyle = '#666';
    ctx.font = '24px Arial';
    ctx.fillText('احتفظ بهذا الباركود للدخول وإبرازه عند البوابة', 500, 1175);

    // Corner ornaments
    ctx.fillStyle = '#C9A84C';
    ctx.font = '28px Arial';
    ctx.fillText('✦', 80, 80);
    ctx.fillText('✦', 920, 80);
    ctx.fillText('✦', 80, 1350);
    ctx.fillText('✦', 920, 1350);

    const link = document.createElement('a');
    link.download = 'Invitation-' + name + '.png';
    link.href = card.toDataURL('image/png');
    link.click();
    showToast('📥 Saved: ' + name);
    document.body.removeChild(tempDiv);
  }, 300);
}

async function downloadAllQR() {
  if (guests.length === 0) { showToast('⚠️ No guests to download'); return; }
  showToast('⏳ Preparing ZIP... please wait');

  const zip = new JSZip();
  const total = guests.length;
  let done = 0;

  function generateCardForGuest(guest) {
    return new Promise((resolve) => {
      const tempDiv = document.createElement('div');
      tempDiv.style.cssText = 'position:fixed;left:-9999px;top:-9999px;background:white;padding:12px;';
      document.body.appendChild(tempDiv);

      new QRCode(tempDiv, {
        text: SITE_URL + '/?verify=' + guest.id,
        width: 400, height: 400,
        colorDark: '#0A0A0A', colorLight: '#FAFAF8',
        correctLevel: QRCode.CorrectLevel.H
      });

      setTimeout(() => {
        const qrCanvas = tempDiv.querySelector('canvas');
        if (!qrCanvas) { document.body.removeChild(tempDiv); resolve(null); return; }

        const card = document.createElement('canvas');
        card.width = 1000; card.height = 1400;
        const ctx = card.getContext('2d');

        ctx.fillStyle = '#FAFAF8';
        ctx.fillRect(0, 0, 1000, 1400);
        ctx.fillStyle = '#C9A84C';
        ctx.fillRect(0, 0, 1000, 22);
        ctx.fillRect(0, 1378, 1000, 22);
        ctx.fillRect(0, 0, 6, 1400);
        ctx.fillRect(994, 0, 6, 1400);

        ctx.fillStyle = '#C9A84C';
        ctx.font = 'bold 62px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('دعوة زفاف', 500, 110);

        ctx.fillStyle = '#999';
        ctx.font = '34px Arial';
        ctx.fillText('الخميس 3 سبتمبر 2026', 500, 168);

        ctx.strokeStyle = '#C9A84C';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(300, 200); ctx.lineTo(700, 200); ctx.stroke();

        ctx.drawImage(qrCanvas, 200, 225, 600, 600);

        ctx.fillStyle = '#0A0A0A';
        ctx.font = 'bold 54px Arial';
        ctx.fillText(guest.name, 500, 910);

        ctx.fillStyle = '#BBB';
        ctx.font = '28px Arial';
        ctx.fillText(guest.id, 500, 965);

        ctx.strokeStyle = '#DDD';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(200, 1000); ctx.lineTo(800, 1000); ctx.stroke();

        ctx.fillStyle = '#C9A84C';
        ctx.font = 'bold 38px Arial';
        ctx.fillText('Golden Halls', 500, 1065);

        ctx.fillStyle = '#888';
        ctx.font = '26px Arial';
        ctx.fillText('هذا الباركود لشخص واحد فقط', 500, 1120);

        ctx.fillStyle = '#666';
        ctx.font = '24px Arial';
        ctx.fillText('احتفظ بهذا الباركود للدخول وإبرازه عند البوابة', 500, 1175);

        ctx.fillStyle = '#C9A84C';
        ctx.font = '28px Arial';
        ctx.fillText('✦', 80, 80);
        ctx.fillText('✦', 920, 80);
        ctx.fillText('✦', 80, 1350);
        ctx.fillText('✦', 920, 1350);

        const dataUrl = card.toDataURL('image/png');
        const base64 = dataUrl.split(',')[1];
        document.body.removeChild(tempDiv);
        resolve({ name: 'Invitation-' + guest.name + '.png', data: base64 });
      }, 350);
    });
  }

  // Process in batches of 5 to avoid freezing
  for (let i = 0; i < total; i += 5) {
    const batch = guests.slice(i, i + 5);
    const results = await Promise.all(batch.map(g => generateCardForGuest(g)));
    results.forEach(r => { if (r) zip.file(r.name, r.data, { base64: true }); });
    done += batch.length;
    showToast('⏳ ' + Math.min(done, total) + ' / ' + total + ' done...');
    await new Promise(r => setTimeout(r, 100));
  }

  const blob = await zip.generateAsync({ type: 'blob' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'Wedding-Invitations.zip';
  link.click();
  showToast('✅ ZIP downloaded! (' + total + ' invitations)');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const verifyId = params.get('verify');
  if (verifyId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-scanner').classList.add('active');
    document.querySelectorAll('.nav-btn')[0].classList.add('active');
    onDbReady(async () => {
      const { getDocs, doc, updateDoc } = window._firestore;
      const val = verifyId.toUpperCase();
      const snapshot = await getDocs(window._guestsCol);
      const docFound = snapshot.docs.find(d => d.data().id === val);
      if (docFound) {
        const guest = docFound.data();
        if (guest.scanned) {
          document.getElementById('result-name-dup').textContent = guest.name;
          document.getElementById('result-duplicate').style.display = 'block';
          document.getElementById('camera-status').textContent = '⚠️ Already checked in!';
        } else {
          document.getElementById('result-name-ok').textContent = guest.name;
          document.getElementById('result-allowed').style.display = 'block';
          document.getElementById('camera-status').textContent = '✅ Access Allowed';
          await updateDoc(doc(window._db, 'guests', guestData.docId), { scanned: true, scannedAt: new Date().toISOString() });
        }
      } else {

    window.history.replaceState({}, '', '/');

});
