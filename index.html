<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

    authDomain: "wedding-qr-27f3c.firebaseapp.com",
    projectId: "wedding-qr-27f3c",

  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const guestsCol = collection(db, 'guests');

  window._db = db;
  window._guestsCol = guestsCol;
  window._firestore = { collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot, runTransaction };
  window._dbReady = true;
  window.dispatchEvent(new Event('dbReady'));

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --gold: #D4AF7F; --gold-light: #E8D4B8; --black: #0F0F0F; --dark: #1A1A1A; --white: #FAFAF8; }
  body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #0F0F0F 0%, #1A1A1A 100%); color: var(--white); min-height: 100vh; overflow-x: hidden; }

  nav { display: flex; justify-content: center; gap: 12px; padding: 20px 16px; background: rgba(26,26,26,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(212, 175, 127, 0.2); flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
  .nav-btn { padding: 12px 28px; border: 1.5px solid rgba(212, 175, 127, 0.3); background: rgba(255,255,255,0.02); color: #999; border-radius: 50px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 500; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  .nav-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 127, 0.05); }
  .nav-btn.active { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); color: var(--black); border-color: var(--gold); font-weight: 700; box-shadow: 0 8px 32px rgba(212, 175, 127, 0.25); }
  .nav-btn.nav-refresh { padding: 12px 14px; font-size: 16px; }
  .nav-btn.nav-refresh:active { transform: rotate(180deg); }

  .page { display: none; padding: 16px 16px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.6s ease-out; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .hero { text-align: center; padding: 16px 0 14px; }
  .hero-ornament { font-size: 24px; color: var(--gold); letter-spacing: 10px; margin-bottom: 8px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--gold-light); letter-spacing: 1.5px; margin-bottom: 6px; }
  .hero .subtitle { font-size: 12px; color: #888; letter-spacing: 2px; text-transform: uppercase; }
  .gold-line { width: 64px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 12px auto; }

  .card { background: linear-gradient(135deg, rgba(26,26,26,0.9), rgba(15,15,15,0.95)); border: 1px solid rgba(212, 175, 127, 0.15); border-radius: 18px; padding: 28px; margin-bottom: 18px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); transition: all 0.4s ease; }
  .card:hover { border-color: rgba(212, 175, 127, 0.35); box-shadow: 0 12px 48px rgba(212, 175, 127, 0.15); }
  .card-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--gold-light); margin-bottom: 18px; text-align: center; }

  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 13px; color: var(--gold); margin-bottom: 10px; font-weight: 500; letter-spacing: 0.5px; }
  input[type=text], input[type=password], textarea { width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(212, 175, 127, 0.2); border-radius: 12px; color: var(--white); font-family: 'Tajawal', sans-serif; font-size: 15px; outline: none; transition: all 0.3s ease; }
  input:focus, textarea:focus { border-color: var(--gold); background: rgba(212, 175, 127, 0.08); box-shadow: 0 0 20px rgba(212, 175, 127, 0.15); }
  input::placeholder { color: #555; }

  .btn { width: 100%; padding: 15px 24px; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); color: var(--black); border: none; border-radius: 12px; font-family: 'Tajawal', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 10px; box-shadow: 0 4px 16px rgba(212, 175, 127, 0.25); }
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
  .action-grid .btn-sm { width: 100%; padding: 11px 10px; font-size: 13px; font-weight: 600; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,127,0.3); color: var(--gold); cursor: pointer; transition: all 0.2s ease; font-family: 'Tajawal', sans-serif; }
  .action-grid .btn-sm:hover { background: rgba(212,175,127,0.1); border-color: var(--gold); }
  .action-grid .btn-sm.danger { border-color: rgba(220,80,80,0.4); color: #e57373; }
  .action-grid .btn-sm.danger:hover { background: rgba(220,80,80,0.12); border-color: #e57373; }
  .action-grid .full { grid-column: 1 / -1; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(212, 175, 127, 0.35); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }
  .btn-outline { background: transparent; border: 1.5px solid var(--gold); color: var(--gold); margin-top: 10px; box-shadow: none; }
  .btn-outline:hover { background: rgba(212, 175, 127, 0.1); box-shadow: 0 4px 16px rgba(212, 175, 127, 0.2); }

  .message { text-align: center; color: var(--gold); font-size: 14px; margin-bottom: 16px; padding: 14px; background: rgba(212, 175, 127, 0.08); border-radius: 10px; border-left: 3px solid var(--gold); }

  .camera-wrapper { position: relative; width: 100%; max-width: 320px; margin: 0 auto 16px; border-radius: 16px; overflow: hidden; border: 2px solid var(--gold); background: #000; aspect-ratio: 1; }
  #camera-video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { width: 65%; height: 65%; border: 2px solid var(--gold); border-radius: 12px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.45); }
  .scan-line { position: absolute; width: 65%; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); animation: scanLine 2s linear infinite; }
  @keyframes scanLine { 0% { top: 17.5%; } 100% { top: 82.5%; } }
  .camera-status { font-size: 13px; color: #666; margin-bottom: 14px; min-height: 20px; text-align: center; }

  .result-card { display: none; padding: 24px; border-radius: 16px; margin-top: 16px; text-align: center; animation: slideUp 0.4s ease-out; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .result-card.allowed { background: linear-gradient(135deg, rgba(76, 175, 80, 0.12), rgba(76, 175, 80, 0.04)); border: 1px solid rgba(76, 175, 80, 0.3); }
  .result-card.duplicate { background: linear-gradient(135deg, rgba(255, 193, 7, 0.12), rgba(255, 193, 7, 0.04)); border: 1px solid rgba(255, 193, 7, 0.3); }
  .result-card.denied { background: linear-gradient(135deg, rgba(244, 67, 54, 0.12), rgba(244, 67, 54, 0.04)); border: 1px solid rgba(244, 67, 54, 0.3); }
  .result-icon { font-size: 48px; margin-bottom: 12px; }
  .result-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--gold-light); margin-bottom: 8px; }
  .result-status { font-size: 14px; color: #999; }
  .result-status.ok { color: #4CAF50; }
  .result-status.dup { color: var(--gold); }
  .result-status.err { color: #F44336; }

  .admin-lock { text-align: center; padding: 60px 20px; }
  .admin-lock h2 { font-size: 20px; color: var(--gold); margin-bottom: 20px; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 18px; }
  .stat-box { background: linear-gradient(135deg, rgba(26,26,26,0.9), rgba(15,15,15,0.95)); border: 1px solid rgba(212, 175, 127, 0.15); border-radius: 14px; padding: 16px; text-align: center; transition: all 0.3s ease; }
  .stat-box:hover { border-color: rgba(212, 175, 127, 0.35); }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--gold); }
  .stat-label { font-size: 11px; color: #888; margin-top: 6px; }
  .guest-list { background: linear-gradient(135deg, rgba(26,26,26,0.9), rgba(15,15,15,0.95)); border: 1px solid rgba(212, 175, 127, 0.15); border-radius: 16px; overflow: hidden; max-height: 60vh; overflow-y: auto; }
  .guest-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid rgba(212, 175, 127, 0.08); gap: 10px; transition: background 0.2s ease; }
  .guest-item:hover { background: rgba(212, 175, 127, 0.05); }
  .guest-item:last-child { border-bottom: none; }
  .guest-item .name { color: var(--white); font-size: 14px; font-weight: 500; }
  .guest-item .gid { color: #666; font-size: 11px; direction: ltr; }
  .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .badge.scanned { background: rgba(76, 175, 80, 0.15); color: #4CAF50; }
  .badge.pending { background: rgba(255,255,255,0.05); color: #888; }
  .del-btn { background: none; border: none; color: #F44336; font-size: 18px; cursor: pointer; padding: 4px 8px; transition: all 0.2s ease; }
  .del-btn:hover { transform: scale(1.2); }
  .empty-state { text-align: center; padding: 40px 20px; color: #666; font-size: 14px; }

  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--black); padding: 14px 28px; border-radius: 50px; font-weight: 700; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 999; box-shadow: 0 8px 24px rgba(212, 175, 127, 0.3); }
  .toast.show { opacity: 1; }
  .guest-item .dl-btn { background: none; border: 1px solid rgba(212,175,127,0.3); color: var(--gold); font-size: 13px; cursor: pointer; padding: 4px 10px; border-radius: 8px; transition: all 0.2s ease; white-space: nowrap; }
  .guest-item .dl-btn:hover { background: rgba(212,175,127,0.1); border-color: var(--gold); }
  .guest-item .attend-btn { background: rgba(76,175,80,0.12); border: 1px solid rgba(76,175,80,0.5); color: #4CAF50; font-size: 13px; cursor: pointer; padding: 4px 10px; border-radius: 8px; transition: all 0.2s ease; white-space: nowrap; }
  .guest-item .attend-btn:hover { background: rgba(76,175,80,0.25); border-color: #4CAF50; }
  .admin-add-form { display: flex; gap: 8px; margin-bottom: 14px; }
  .admin-add-form input { flex: 1; }
  .admin-add-form button { width: auto; padding: 14px 20px; white-space: nowrap; }
  #splash { position: fixed; inset: 0; z-index: 9999; background: radial-gradient(circle at 50% 40%, #1a1a1a, #0A0A0A); display: flex; align-items: center; justify-content: center; transition: opacity 0.6s ease, visibility 0.6s ease; }
  #splash.hide { opacity: 0; visibility: hidden; }
  .splash-inner { text-align: center; animation: splashFade 1s ease-out; }
  .splash-ornament { font-size: 56px; color: var(--gold); letter-spacing: 14px; animation: float 3s ease-in-out infinite; margin-bottom: 18px; }
  .splash-title { font-family: 'Playfair Display', serif; font-size: 44px; font-weight: 700; color: var(--gold-light); letter-spacing: 2px; margin-bottom: 10px; }
  .splash-line { width: 100px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 22px auto 0; }
  @keyframes splashFade { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-inner">
    <div class="splash-ornament">✦</div>
    <div class="splash-title">دعوة زفاف</div>
    <div class="splash-line"></div>
  </div>
</div>

<nav>
  <button class="nav-btn active" onclick="showPage('scanner', this)">📱 Scan</button>
  <button class="nav-btn" onclick="showPage('admin', this)">⚙️ Admin</button>
  <button class="nav-btn nav-refresh" onclick="location.reload()" title="Refresh">🔄</button>
</nav>

<!-- SCANNER -->
<div class="page active" id="page-scanner">
  <div class="hero">
    <div class="hero-ornament">✦</div>
    <h1>QR Scanner</h1>
    <p class="subtitle">For Security Only</p>
    <div class="gold-line"></div>
    <div id="scan-counter" style="font-size:15px;color:var(--gold);font-weight:600;margin-top:4px">Entered: 0 / 0</div>
  </div>
  <div class="card" style="text-align:center">
    <p class="camera-status" id="camera-status">Open camera and scan the barcode</p>
    <button class="btn" id="start-camera-btn" onclick="startCamera()" style="display:block;width:100%">📷 Scan QR Code</button>
    
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid #222">
      <p style="color:#666;font-size:12px;margin-bottom:10px">Or enter code manually:</p>
      <div style="display:flex;gap:8px">
        <input type="text" id="manual-code" placeholder="Example: WD-ABC123" style="flex:1">
        <button class="btn" onclick="checkManualCode()" style="width:auto;padding:14px 16px">✓ Verify</button>
      </div>
    </div>
    
    <div class="camera-wrapper" id="camera-wrapper" style="display:none;margin-top:14px">
      <video id="camera-video" autoplay playsinline muted></video>
      <div class="scan-overlay">
        <div class="scan-frame"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="result-card allowed" id="result-allowed">
      <div class="result-icon">✅</div>
      <div class="result-name" id="result-name-ok"></div>
      <div class="result-status ok">Access Allowed</div>
    </div>
    <div class="result-card duplicate" id="result-duplicate">
      <div class="result-icon">⚠️</div>
      <div class="result-name" id="result-name-dup"></div>
      <div class="result-status dup">Already Checked In!</div>
    </div>
    <div class="result-card denied" id="result-denied">
      <div class="result-icon">❌</div>
      <div class="result-name">Not Registered</div>
      <div class="result-status err">Invalid QR Code</div>
    </div>
  </div>

<script>
const ADMIN_PASS = '19921995';
const SITE_URL = 'https://hsalahs.github.io';

let guests = [];
let unsubscribe = null;
let qrScanner = null;
let lastScanned = null;
let scanCooldown = false;
let searchQuery = '';
let audioCtx = null;
let dataLoaded = false;

function onDbReady(cb) {
  if (window._dbReady) cb();
  else window.addEventListener('dbReady', cb);
}

onDbReady(() => {
  const { onSnapshot } = window._firestore;
  unsubscribe = onSnapshot(window._guestsCol, (snapshot) => {
    guests = snapshot.docs.map(d => ({ docId: d.id, ...d.data() }));
    dataLoaded = true;
    updateCounter();
    // Always refresh the admin list when data changes, as long as admin is unlocked
    if (document.getElementById('admin-content') && document.getElementById('admin-content').style.display === 'block') {
      renderAdmin();
    }
  });
});

function showPage(page, btn) {
  if (page === 'scanner') resetScan();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (btn) btn.classList.add('active');
  if (page === 'admin') renderAdmin();
}







async function startCamera() {
  const status = document.getElementById('camera-status');
  const video = document.getElementById('camera-video');
  status.textContent = 'Starting camera...';

  let retries = 2;
  while (retries >= 0) {
    try {
      qrScanner = new QrScanner(video, result => {
        if (!scanCooldown) handleScannedCode(result.data);
      }, { returnDetailedScanResult: true, preferredCamera: 'environment' });
      await qrScanner.start();
      document.getElementById('camera-wrapper').style.display = 'block';
      document.getElementById('start-camera-btn').style.display = 'none';
      status.textContent = 'Point camera at QR code';
      return; // success
    } catch(e) {
      // Clean up failed attempt before retrying
      if (qrScanner) { try { qrScanner.destroy(); } catch(_) {} qrScanner = null; }
      retries--;
      if (retries < 0) {
        status.textContent = '⚠️ Could not access camera. Check permissions or use manual entry below.';
      } else {
        status.textContent = 'Retrying camera...';
        await new Promise(r => setTimeout(r, 800));
      }
    }
  }
}

async function checkManualCode() {
  const code = document.getElementById('manual-code').value.trim().toUpperCase();
  if (!code.startsWith('WD-')) { showToast('⚠️ Code must start with WD-'); return; }
  await handleScannedCode(code);
  document.getElementById('manual-code').value = '';
}

async function handleScannedCode(raw) {
  let val = raw.trim();
  if (val.includes('verify=')) val = val.split('verify=')[1].split('&')[0];
  const match = val.match(/WD-[A-Za-z0-9]+/);
  if (match) val = match[0];
  val = val.toUpperCase();
  if (!val.startsWith('WD-')) return;
  if (val === lastScanned) return;
  lastScanned = val;
  scanCooldown = true;

  document.getElementById('camera-status').textContent = '🔍 Verifying...';

  try {
    const { getDocs, doc, updateDoc, runTransaction } = window._firestore;
    
    // Smart approach: Try local array first (faster), fallback to Firebase if needed
    let guestData = null;
    let docId = null;
    
    if (guests.length > 0) {
      const found = guests.find(g => g.id.toUpperCase() === val);
      if (found) {
        guestData = found;
        docId = found.docId;
      }
    }
    
    // Fallback to Firebase if not found locally
    if (!guestData) {
      const snapshot = await getDocs(window._guestsCol);
      const docFound = snapshot.docs.find(d => d.data().id.toUpperCase() === val);
      if (docFound) {
        guestData = docFound.data();
        docId = docFound.id;
      }
    }

    if (guestData) {
      // Use transaction to prevent double-entry if 2 scanners scan same QR
      const guestRef = doc(window._db, 'guests', docId);
      const result = await runTransaction(window._db, async (transaction) => {
        const snap = await transaction.get(guestRef);
        if (!snap.exists()) return 'not_found';
        if (snap.data().scanned) return 'already';
        transaction.update(guestRef, { scanned: true, scannedAt: new Date().toISOString() });
        return 'allowed';
      });

      if (result === 'allowed') {
        document.getElementById('result-name-ok').textContent = guestData.name;
        document.getElementById('result-allowed').style.display = 'block';
        document.getElementById('result-duplicate').style.display = 'none';
        document.getElementById('result-denied').style.display = 'none';
        document.getElementById('camera-status').textContent = '✅ Access Allowed';
        playBeep(true);
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        document.getElementById('result-allowed').classList.add('pulse');
        setTimeout(() => document.getElementById('result-allowed').classList.remove('pulse'), 400);
        // Update local array immediately so admin reflects it without waiting
        const idx = guests.findIndex(g => g.docId === docId);
        if (idx !== -1) guests[idx] = { ...guests[idx], scanned: true, scannedAt: new Date().toISOString() };
        updateCounter();
        if (document.getElementById('admin-content').style.display === 'block') renderAdmin();
      } else {
        document.getElementById('result-name-dup').textContent = guestData.name;
        document.getElementById('result-allowed').style.display = 'none';
        document.getElementById('result-duplicate').style.display = 'block';
        document.getElementById('result-denied').style.display = 'none';
        document.getElementById('camera-status').textContent = '⚠️ Already checked in!';
        playBeep(false);
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      }
    } else {
      document.getElementById('result-allowed').style.display = 'none';
      document.getElementById('result-duplicate').style.display = 'none';
      document.getElementById('result-denied').style.display = 'block';
      document.getElementById('camera-status').textContent = '❌ QR Code not registered';
      playBeep(false);
      if (navigator.vibrate) navigator.vibrate(500);
    }
  } catch(e) {
    console.error(e);
    document.getElementById('camera-status').textContent = '⚠️ Connection error';
  }

  setTimeout(() => {
    scanCooldown = false; lastScanned = null;
    document.getElementById('camera-status').textContent = 'Point camera at QR code';
    document.getElementById('result-allowed').style.display = 'none';
    document.getElementById('result-duplicate').style.display = 'none';
    document.getElementById('result-denied').style.display = 'none';
  }, 3000);
}

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBeep(success) {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = success ? 880 : 300;
    o.type = success ? 'sine' : 'square';
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

function resetScan() {
  if (qrScanner) { qrScanner.stop(); qrScanner.destroy(); qrScanner = null; }
  lastScanned = null; scanCooldown = false;
  document.getElementById('camera-wrapper').style.display = 'none';
  document.getElementById('start-camera-btn').style.display = 'block';
  document.getElementById('camera-status').textContent = 'Open camera and scan the QR code';
  document.getElementById('result-allowed').style.display = 'none';
  document.getElementById('result-duplicate').style.display = 'none';
  document.getElementById('result-denied').style.display = 'none';
}

function checkPass() {
  const pass = document.getElementById('admin-pass').value;
  if (pass === ADMIN_PASS) {
    sessionStorage.setItem('wd_admin', '1');
    document.getElementById('admin-lock').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
    renderAdmin();
  } else { showToast('❌ Incorrect password'); }
}

function lockAdmin() {
  sessionStorage.removeItem('wd_admin');
  document.getElementById('admin-lock').style.display = 'block';
  document.getElementById('admin-content').style.display = 'none';
  document.getElementById('admin-pass').value = '';
}

// Keep admin unlocked across page refresh (same browser tab session)
function restoreAdminSession() {
  if (sessionStorage.getItem('wd_admin') === '1') {
    document.getElementById('admin-lock').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
    renderAdmin();
  }
}

function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Update the live attendance counter on the scanner page.
// Reads from the local guests array — no extra Firebase calls.
function updateCounter() {
  const el = document.getElementById('scan-counter');
  if (!el) return;
  const total = guests.length;
  const entered = guests.filter(g => g.scanned).length;
  el.textContent = 'Entered: ' + entered + ' / ' + total;
}

function renderAdmin() {
  const total = guests.length;
  const scanned = guests.filter(g => g.scanned).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-scanned').textContent = scanned;
  document.getElementById('stat-pending').textContent = total - scanned;

  const list = document.getElementById('guest-list');

  // Respect active search filter
  const filtered = searchQuery.trim()
    ? guests.filter(g => g.name.toLowerCase().includes(searchQuery.toLowerCase()))
    : guests;

  if (filtered.length === 0) {
    let msg;
    if (searchQuery) msg = 'No guests found';
    else if (!dataLoaded) msg = '⏳ Loading guests...';
    else msg = 'No guests registered yet';
    list.innerHTML = `<div class="empty-state">${msg}</div>`;
    return;
  }

  list.innerHTML = filtered.map((g) => `
    <div class="guest-item">
      <div style="flex:1;min-width:0">
        <div class="name">${escapeHtml(g.name)}</div>
        <div class="gid">${g.id}</div>
      </div>
      <span class="badge ${g.scanned ? 'scanned' : 'pending'}">${g.scanned ? '✓ Attended' : 'Not Yet'}</span>
      ${g.scanned ? '' : `<button class="attend-btn" onclick="markAttended('${g.docId}', '${escapeHtml(g.name).replace(/'/g, "\\'")}')">✓ Attend</button>`}
      <button class="dl-btn" onclick="downloadGuestQR('${g.id}', '${escapeHtml(g.name).replace(/'/g, "\\'")}')">💾 Save</button>
      <button class="del-btn" onclick="deleteGuest('${g.docId}', '${escapeHtml(g.name)}')">🗑</button>
    </div>
  `).join('');
}

// Manually mark a guest as attended (for guests who forgot their QR).
// Same effect as scanning their barcode, so a later duplicate scan is blocked.
async function markAttended(docId, name) {
  if (!confirm('Mark ' + name + ' as attended? This counts as entry.')) return;
  try {
    const { doc, updateDoc } = window._firestore;
    await updateDoc(doc(window._db, 'guests', docId), { scanned: true, scannedAt: new Date().toISOString() });
    // Update local array immediately
    const idx = guests.findIndex(g => g.docId === docId);
    if (idx !== -1) guests[idx] = { ...guests[idx], scanned: true, scannedAt: new Date().toISOString() };
    updateCounter();
    renderAdmin();
    showToast('✅ ' + name + ' marked as attended');
  } catch(e) {
    console.error(e);
    showToast('⚠️ Could not update. Try again.');
  }
}

function searchGuests() {
  searchQuery = document.getElementById('admin-search').value;
  renderAdmin();
}



async function deleteGuest(docId, name) {
  if (!confirm('Delete ' + name + '?')) return;
  onDbReady(async () => {
    const { doc, deleteDoc } = window._firestore;
    await deleteDoc(doc(window._db, 'guests', docId));
    showToast('✅ Guest deleted');
  });
}

async function clearAll() {
  if (!confirm('Are you sure? All data will be permanently deleted.')) return;
  onDbReady(async () => {
    const { doc, deleteDoc, getDocs } = window._firestore;
    const snapshot = await getDocs(window._guestsCol);
    await Promise.all(snapshot.docs.map(d => deleteDoc(doc(window._db, 'guests', d.id))));
    showToast('✅ All data cleared');
  });
}

function exportCSV() {
  const rows = [['Name', 'Code', 'Attendance', 'Registered At']];
  guests.forEach(g => rows.push([g.name, g.id, g.scanned ? 'Attended' : 'Not Yet', g.registeredAt]));
  const csv = rows.map(r => r.join(',')).join('\n');
  const link = document.createElement('a');
  link.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  link.download = 'guests-list.csv';
  link.click();
}

async function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      let text = e.target.result;
      
      // Try to handle different separators
      const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    
    // Try to detect if it's CSV with comma or just names
    let names = [];
    lines.forEach(line => {
      if (line.includes(',')) {
        // CSV format - take first column (usually Name)
        const parts = line.split(',');
        const name = parts[0].trim();
        if (name && name.toLowerCase() !== 'name') names.push(name);
      } else {
        // Plain names, one per line
        names.push(line);
      }
    });
    
    if (names.length === 0) {
      showToast('⚠️ No valid names found in file');
      document.getElementById('csv-import').value = '';
      return;
    }
    
    showToast('⏳ Importing ' + names.length + ' guests...');
    let added = 0, duplicates = 0;
    
    // Process in parallel batches for speed - don't wait between batches
    const batchSize = 50;
    const batches = [];
    
    for (let i = 0; i < names.length; i += batchSize) {
      const batch = names.slice(i, i + batchSize);
      batches.push(
        Promise.all(batch.map(async (name) => {
          const exists = guests.find(g => g.name === name);
          if (exists) {
            duplicates++;
            return;
          }
          
          const { addDoc } = window._firestore;
          const id = 'WD-' + Math.random().toString(36).substr(2, 9).toUpperCase() + Date.now().toString(36).toUpperCase().substr(-4);
          await addDoc(window._guestsCol, { id, name, scanned: false, registeredAt: new Date().toISOString() });
          added++;
        }))
      );
    }
    
    await Promise.all(batches);
    
    // Small delay for all to process
    await new Promise(r => setTimeout(r, 500 * names.length / 10));
    showToast('✅ Imported ' + added + ' guests' + (duplicates > 0 ? ' (' + duplicates + ' duplicates skipped)' : ''));
    document.getElementById('csv-import').value = '';
    } catch (error) {
      showToast('⚠️ خطأ في قراءة الملف');
      document.getElementById('csv-import').value = '';
    }
  };
  reader.readAsText(file);
}

async function adminAddGuest() {
  const input = document.getElementById('admin-guest-name');
  const name = input.value.trim();
  if (!name || name.length < 2) { showToast('⚠️ Enter a valid name'); return; }
  const exists = guests.find(g => g.name === name);
  if (exists) { showToast('⚠️ Name already registered'); return; }
  onDbReady(async () => {
    const { addDoc } = window._firestore;
    const id = 'WD-' + Math.random().toString(36).substr(2, 9).toUpperCase() + Date.now().toString(36).toUpperCase().substr(-4);
    await addDoc(window._guestsCol, { id, name, scanned: false, registeredAt: new Date().toISOString() });
    showToast('✅ ' + name + ' added!');
    input.value = '';
    input.focus();
  });
}

// ============================================================
//  ONE shared function to draw the invitation card.
//  Returns a Promise that resolves to a <canvas>.
//  Both single-download and ZIP-download use this — no duplication.
// ============================================================
function buildInvitationCard(guest) {
  return new Promise((resolve) => {
    const tempDiv = document.createElement('div');
    tempDiv.style.cssText = 'position:fixed;left:-9999px;top:-9999px;background:white;padding:12px;';
    document.body.appendChild(tempDiv);

    new QRCode(tempDiv, {
      text: SITE_URL + '/?verify=' + guest.id,
      width: 400, height: 400,
      colorDark: '#0A0A0A', colorLight: '#FAFAF8',
      correctLevel: QRCode.CorrectLevel.H
    });

    setTimeout(() => {
      const qrCanvas = tempDiv.querySelector('canvas');
      if (!qrCanvas) { document.body.removeChild(tempDiv); resolve(null); return; }

      const card = document.createElement('canvas');
      card.width = 1000; card.height = 1400;
      const ctx = card.getContext('2d');

      // Background
      ctx.fillStyle = '#FAFAF8';
      ctx.fillRect(0, 0, 1000, 1400);

      // Gold border bars + sides
      ctx.fillStyle = '#C9A84C';
      ctx.fillRect(0, 0, 1000, 22);
      ctx.fillRect(0, 1378, 1000, 22);
      ctx.fillRect(0, 0, 6, 1400);
      ctx.fillRect(994, 0, 6, 1400);

      // Title
      ctx.fillStyle = '#C9A84C';
      ctx.font = 'bold 62px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('دعوة زفاف', 500, 110);

      // Date
      ctx.fillStyle = '#999';
      ctx.font = '34px Arial';
      ctx.fillText('الخميس 3 سبتمبر 2026', 500, 168);

      // Divider
      ctx.strokeStyle = '#C9A84C';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(300, 200); ctx.lineTo(700, 200); ctx.stroke();

      // QR
      ctx.drawImage(qrCanvas, 200, 225, 600, 600);

      // Name
      ctx.fillStyle = '#0A0A0A';
      ctx.font = 'bold 54px Arial';
      ctx.fillText(guest.name, 500, 910);

      // ID
      ctx.fillStyle = '#BBB';
      ctx.font = '28px Arial';
      ctx.fillText(guest.id, 500, 965);

      // Divider
      ctx.strokeStyle = '#DDD';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(200, 1000); ctx.lineTo(800, 1000); ctx.stroke();

      // Venue
      ctx.fillStyle = '#C9A84C';
      ctx.font = 'bold 38px Arial';
      ctx.fillText('Golden Halls', 500, 1065);

      // Notices
      ctx.fillStyle = '#888';
      ctx.font = '26px Arial';
      ctx.fillText('هذا الباركود لشخص واحد فقط', 500, 1120);
      ctx.fillStyle = '#666';
      ctx.font = '24px Arial';
      ctx.fillText('احتفظ بهذا الباركود للدخول وإبرازه عند البوابة', 500, 1175);

      // Corner ornaments
      ctx.fillStyle = '#C9A84C';
      ctx.font = '28px Arial';
      ctx.fillText('✦', 80, 80);
      ctx.fillText('✦', 920, 80);
      ctx.fillText('✦', 80, 1350);
      ctx.fillText('✦', 920, 1350);

      document.body.removeChild(tempDiv);
      resolve(card);
    }, 300);
  });
}

// Download a single guest's invitation
async function downloadGuestQR(id, name) {
  const card = await buildInvitationCard({ id, name });
  if (!card) { showToast('⚠️ Error generating QR'); return; }
  const link = document.createElement('a');
  link.download = 'Invitation-' + name + '.png';
  link.href = card.toDataURL('image/png');
  link.click();
  showToast('📥 Saved: ' + name);
}

// Download all invitations as a ZIP
// Download invitations as ZIP.
// Optional from/to (1-based, inclusive) to download a range only — avoids
// rendering hundreds of cards at once on a phone. No args = download all.
async function downloadAllQR(from, to) {
  if (guests.length === 0) { showToast('⚠️ No guests to download'); return; }

  // Decide which guests to export
  let list = guests;
  let label = '';
  if (from && to) {
    if (from > to || from < 1) { showToast('⚠️ Check the range numbers'); return; }
    list = guests.slice(from - 1, to);   // 1-based to 0-based
    label = '-' + from + '-' + to;
    if (list.length === 0) { showToast('⚠️ No guests in this range'); return; }
  }

  showToast('⏳ Preparing ZIP... please wait');

  const zip = new JSZip();
  const total = list.length;
  let done = 0;

  // Process in batches of 5 to avoid freezing the browser
  for (let i = 0; i < total; i += 5) {
    const batch = list.slice(i, i + 5);
    const cards = await Promise.all(batch.map(g => buildInvitationCard(g)));
    cards.forEach((card, idx) => {
      if (card) {
        const base64 = card.toDataURL('image/png').split(',')[1];
        zip.file('Invitation-' + batch[idx].name + '.png', base64, { base64: true });
      }
    });
    done += batch.length;
    showToast('⏳ ' + Math.min(done, total) + ' / ' + total + ' done...');
    await new Promise(r => setTimeout(r, 100));
  }

  const blob = await zip.generateAsync({ type: 'blob' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'Wedding-Invitations' + label + '.zip';
  link.click();
  showToast('✅ ZIP downloaded! (' + total + ' invitations)');
}

// Ask the user for a range via simple prompts, then download it
function askRange() {
  const total = guests.length;
  if (total === 0) { showToast('⚠️ No guests yet'); return; }

  const fromStr = prompt('Download from which number? (1 - ' + total + ')', '1');
  if (fromStr === null) return; // cancelled
  const from = parseInt(fromStr);

  const toStr = prompt('To which number? (' + (from || 1) + ' - ' + total + ')', String(Math.min(from + 99, total)));
  if (toStr === null) return; // cancelled
  const to = parseInt(toStr);

  if (!from || !to || from < 1 || to < from) {
    showToast('⚠️ Invalid range. Try again.');
    return;
  }
  downloadAllQR(from, to);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

window.addEventListener('load', () => {
  // Hide splash screen after a brief, elegant pause
  setTimeout(() => {
    const splash = document.getElementById('splash');
    if (splash) splash.classList.add('hide');
  }, 1600);
  restoreAdminSession();
  const params = new URLSearchParams(window.location.search);
  const verifyId = params.get('verify');
  if (verifyId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-scanner').classList.add('active');
    document.querySelectorAll('.nav-btn')[0].classList.add('active');
    onDbReady(async () => {
      try {
        const { getDocs, doc, updateDoc } = window._firestore;
        const val = verifyId.toUpperCase();
        const snapshot = await getDocs(window._guestsCol);
        const docFound = snapshot.docs.find(d => d.data().id.toUpperCase() === val);
        if (docFound) {
          const guest = docFound.data();
          if (guest.scanned) {
            document.getElementById('result-name-dup').textContent = guest.name;
            document.getElementById('result-duplicate').style.display = 'block';
            document.getElementById('camera-status').textContent = '⚠️ Already checked in!';
          } else {
            document.getElementById('result-name-ok').textContent = guest.name;
            document.getElementById('result-allowed').style.display = 'block';
            document.getElementById('camera-status').textContent = '✅ Access Allowed';
            await updateDoc(doc(window._db, 'guests', docFound.id), { scanned: true, scannedAt: new Date().toISOString() });
            const idx = guests.findIndex(g => g.docId === docFound.id);
            if (idx !== -1) guests[idx] = { ...guests[idx], scanned: true };
          }
        } else {
          document.getElementById('result-denied').style.display = 'block';
          document.getElementById('camera-status').textContent = '❌ QR Code not registered';
        }
      } catch(e) {
        console.error(e);
        document.getElementById('camera-status').textContent = '⚠️ Connection error';
      }
    });
    window.history.replaceState({}, '', '/');
  }
});

// Cleanup on page unload to free Firebase listener and camera
window.addEventListener('beforeunload', () => {
  if (unsubscribe) unsubscribe();
  if (qrScanner) { try { qrScanner.destroy(); } catch(e) {} qrScanner = null; }
});
</script>
